services:
  db:
    image: postgres:16-alpine
    container_name: ranking-tenis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ranking_tenis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ranking_tenis"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ranking-tenis-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ranking_tenis?schema=public
      JWT_SECRET: change-me
      JWT_REFRESH_SECRET: change-me-too
    ports:
      - "3333:3333"

volumes:
  postgres_data:
